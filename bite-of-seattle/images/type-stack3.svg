                <tspan x="0" y="92">Open Sans/Regular/12pt</tspan>
            </text>
            <text id="This-is-a-paragraph">
                <tspan x="0" y="11">This is a paragraph for mobile. Lorem ipsum dolor sit amet, consectetur </tspan>
